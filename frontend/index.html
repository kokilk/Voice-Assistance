<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>K — Voice Assistant</title>
  <style>
    /* ═══════════════════ DESIGN TOKENS ═══════════════════ */
    :root {
      --bg:        #04070f;
      --surface:   rgba(10, 16, 36, 0.78);
      --border:    rgba(255, 255, 255, 0.07);
      --text:      #e8eeff;
      --muted:     #6b7fa3;
      --accent:    #7c5cfc;   /* violet */
      --accent-2:  #06d6a0;   /* emerald */
      --accent-3:  #f72585;   /* pink */
      --danger:    #f43f5e;
      --tilt-x:    0deg;
      --tilt-y:    0deg;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { height: 100%; }

    body {
      font-family: "SF Pro Display", "Inter", "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100%;
      overflow-x: hidden;
    }

    /* Dot-grid ambient layer */
    body::before {
      content: "";
      position: fixed;
      inset: 0;
      background-image: radial-gradient(circle, rgba(124,92,252,0.055) 1px, transparent 1px);
      background-size: 38px 38px;
      pointer-events: none;
      z-index: 0;
    }

    /* Colour bloom clouds */
    body::after {
      content: "";
      position: fixed;
      inset: 0;
      background:
        radial-gradient(ellipse 55% 38% at 15% -5%,  rgba(124,92,252,0.16) 0%, transparent 60%),
        radial-gradient(ellipse 45% 32% at 88% 95%,  rgba(247,37,133,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 38% 28% at 92% 8%,   rgba(6,214,160,0.08) 0%, transparent 55%);
      pointer-events: none;
      z-index: 0;
    }

    /* ═══════════════════ NAV BAR ═══════════════════ */
    .nav {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 62px;
      z-index: 200;
      background: rgba(4, 7, 15, 0.86);
      backdrop-filter: blur(20px) saturate(1.5);
      -webkit-backdrop-filter: blur(20px) saturate(1.5);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 2rem;
    }

    .nav-brand {
      display: flex;
      align-items: baseline;
      gap: 0.65rem;
    }

    .nav-logo {
      font-size: 1.65rem;
      font-weight: 900;
      letter-spacing: -0.02em;
      background: linear-gradient(130deg, #a78bfa 0%, #06d6a0 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .nav-tagline {
      font-size: 0.68rem;
      font-weight: 600;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
    }

    .nav-actions {
      display: flex;
      align-items: center;
      gap: 0.7rem;
    }

    #user-email {
      font-size: 0.78rem;
      color: var(--muted);
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    /* Sign-in CTA — gradient pill, always in nav */
    #auth-banner {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.48rem 1.15rem;
      border-radius: 999px;
      font-size: 0.82rem;
      font-weight: 700;
      color: #04070f;
      background: linear-gradient(130deg, #a78bfa, #06d6a0);
      text-decoration: none;
      box-shadow: 0 0 24px rgba(167,139,250,0.35);
      transition: 200ms ease;
      letter-spacing: 0.01em;
    }

    #auth-banner:hover {
      transform: translateY(-1px);
      box-shadow: 0 4px 30px rgba(167,139,250,0.5);
    }

    #btn-logout {
      padding: 0.44rem 1rem;
      border-radius: 999px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.04);
      color: var(--muted);
      font-size: 0.78rem;
      font-weight: 600;
      cursor: pointer;
      transition: 200ms ease;
    }

    #btn-logout:hover {
      border-color: rgba(247,37,133,0.4);
      color: #fb7185;
      background: rgba(247,37,133,0.07);
    }

    /* ═══════════════════ APP SHELL ═══════════════════ */
    .app {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding-top: 62px;
    }

    /* ═══════════════════ HERO ═══════════════════ */
    .hero {
      display: flex;
      flex-direction: column;
      align-items: center;
      width: 100%;
      padding: 1.5rem 1.5rem 0.5rem;
      flex: 1;
    }

    /* ═══════════════════ STAGE ═══════════════════ */
    .stage {
      position: relative;
      width: min(100%, 580px);
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Orbit rings */
    .orbit {
      position: absolute;
      top: 50%; left: 50%;
      border-radius: 50%;
      pointer-events: none;
    }

    .orbit.r1 {
      width: 510px; height: 510px;
      border: 1px dashed rgba(124,92,252,0.15);
      animation: orbitSpin 28s linear infinite;
    }
    .orbit.r2 {
      width: 400px; height: 400px;
      border: 1px dashed rgba(6,214,160,0.11);
      animation: orbitSpin 20s linear infinite reverse;
    }
    .orbit.r3 {
      width: 310px; height: 310px;
      border: 1px dashed rgba(247,37,133,0.08);
      animation: orbitSpin 14s linear infinite;
    }

    /* Glowing node dot on each ring */
    .orbit.r1::before {
      content: ""; position: absolute;
      width: 8px; height: 8px; border-radius: 50%;
      background: rgba(124,92,252,0.9);
      box-shadow: 0 0 12px rgba(124,92,252,0.8);
      top: -4px; left: calc(50% - 4px);
    }
    .orbit.r2::after {
      content: ""; position: absolute;
      width: 6px; height: 6px; border-radius: 50%;
      background: rgba(6,214,160,0.9);
      box-shadow: 0 0 10px rgba(6,214,160,0.7);
      bottom: -3px; right: calc(50% - 3px);
    }
    .orbit.r3::before {
      content: ""; position: absolute;
      width: 5px; height: 5px; border-radius: 50%;
      background: rgba(247,37,133,0.85);
      box-shadow: 0 0 9px rgba(247,37,133,0.6);
      right: -2.5px; top: calc(50% - 2.5px);
    }

    @keyframes orbitSpin {
      from { transform: translate(-50%,-50%) rotate(0deg); }
      to   { transform: translate(-50%,-50%) rotate(360deg); }
    }

    /* Character wrap with 3-D tilt */
    #character-wrap {
      position: relative;
      width: 480px; height: 480px;
      display: flex;
      align-items: center;
      justify-content: center;
      transform-style: preserve-3d;
      transform: rotateX(var(--tilt-x)) rotateY(var(--tilt-y));
      transition: transform 180ms ease-out;
      z-index: 2;
    }

    /* Ambient glow behind the brain */
    #glow {
      position: absolute;
      width: 300px; height: 240px;
      border-radius: 50%;
      filter: blur(55px);
      transition: background 400ms ease;
      z-index: 0;
    }
    #glow.idle      { background: rgba(124,92,252,0.14); }
    #glow.listening { background: rgba(6,214,160,0.22); }
    #glow.processing{ background: rgba(167,139,250,0.2); }
    #glow.speaking  { background: rgba(247,37,133,0.24); }

    /* Brain container */
    #cat {
      position: relative;
      width: 100%;
      max-width: 450px;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      transform: translateZ(50px);
      animation: float 5.8s ease-in-out infinite;
      z-index: 1;
    }

    .brain-photo-shell {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      display: grid;
      place-items: center;
    }

    .brain-photo {
      position: absolute;
      width: 0; height: 0;
      opacity: 0; pointer-events: none;
    }

    #brain-canvas {
      position: relative;
      width: 90%;
      aspect-ratio: 320 / 168;
      display: block;
      filter:
        saturate(1.35)
        contrast(1.18)
        brightness(1.02)
        drop-shadow(0 0 32px rgba(167,139,250,0.28))
        drop-shadow(0 24px 48px rgba(0,0,0,0.55));
      z-index: 2;
    }

    /* Spark particles on the brain */
    .brain-spark {
      position: absolute;
      width: 7px; height: 7px;
      border-radius: 50%;
      background: #c4b5fd;
      box-shadow: 0 0 14px rgba(196,181,253,0.95);
      z-index: 4;
      animation: sparkBlink 2.3s ease-in-out infinite;
    }
    .brain-spark.s1 { top: 22%; left: 30%; }
    .brain-spark.s2 { top: 32%; left: 58%; animation-delay: 0.35s; }
    .brain-spark.s3 { top: 50%; left: 63%; animation-delay: 0.72s; }
    .brain-spark.s4 { top: 60%; left: 36%; animation-delay: 1.1s; }
    .brain-spark.s5 { top: 18%; left: 52%; animation-delay: 0.55s; }

    /* Ripple rings emitted from the brain */
    .response-ripples {
      position: absolute;
      inset: 50% auto auto 50%;
      width: 220px; height: 220px;
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }
    .response-ripples span {
      position: absolute; inset: 0;
      border-radius: 50%;
      border: 1px solid rgba(124,92,252,0.18);
      opacity: 0; transform: scale(0.7);
    }

    /* Hidden SVG for mouth animation (used by existing JS) */
    .speech-hooks {
      position: absolute; width: 0; height: 0;
      overflow: hidden; opacity: 0; pointer-events: none;
    }

    /* Character shadow */
    .character-shadow {
      position: absolute;
      bottom: 3rem;
      width: 7rem; height: 1rem;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(55,72,168,0.18), rgba(55,72,168,0));
      filter: blur(14px);
      z-index: 0;
    }

    /* ── State-driven animations ── */
    #cat.listening {
      filter: drop-shadow(0 0 28px rgba(6,214,160,0.22));
    }
    #cat.processing {
      filter: drop-shadow(0 0 28px rgba(167,139,250,0.24));
      animation: float 5.8s ease-in-out infinite, processTilt 4.2s ease-in-out infinite;
    }
    #cat.speaking {
      filter: drop-shadow(0 0 38px rgba(247,37,133,0.3));
      animation: speakShake 0.2s ease-in-out infinite;
    }

    #cat.listening + .response-ripples span,
    #cat.speaking  + .response-ripples span {
      animation: ripple 2.2s ease-out infinite;
    }
    #cat.speaking + .response-ripples span {
      border-color: rgba(247,37,133,0.28);
      animation-duration: 0.85s;
    }
    .response-ripples span:nth-child(2) { animation-delay: 0.32s; }
    .response-ripples span:nth-child(3) { animation-delay: 0.64s; }

    #glow.listening  { background: rgba(6,214,160,0.22); }
    #glow.processing { background: rgba(167,139,250,0.2); }
    #glow.speaking   { background: rgba(247,37,133,0.24); }

    /* ═══════════════════ CONTROLS ═══════════════════ */
    .controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.55rem;
      margin-top: -1.8rem;
    }

    #status-label {
      font-size: 1rem;
      font-weight: 700;
      color: var(--text);
      min-height: 1.5em;
      text-align: center;
      letter-spacing: 0.01em;
    }

    #hint-label {
      font-size: 0.8rem;
      color: var(--muted);
      min-height: 1.4em;
    }

    #hint-label kbd {
      background: rgba(255,255,255,0.07);
      border: 1px solid var(--border);
      border-radius: 5px;
      padding: 0.1rem 0.36rem;
      font-size: 0.7rem;
      color: var(--text);
    }

    /* Mic button */
    #mic-btn {
      width: 84px; height: 84px;
      border-radius: 50%;
      border: 1.5px solid rgba(124,92,252,0.28);
      background: linear-gradient(160deg, rgba(18,24,52,0.96), rgba(6,8,20,0.98));
      color: var(--text);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.1),
        0 0 0 7px rgba(124,92,252,0.06),
        0 14px 38px rgba(0,0,0,0.55);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: 200ms ease;
    }

    #mic-btn:hover {
      border-color: rgba(6,214,160,0.42);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.1),
        0 0 0 9px rgba(6,214,160,0.08),
        0 0 30px rgba(6,214,160,0.15),
        0 14px 38px rgba(0,0,0,0.55);
      transform: translateY(-2px);
    }

    #mic-btn:focus-visible {
      outline: 2px solid rgba(6,214,160,0.5);
      outline-offset: 4px;
    }

    #mic-btn.listening {
      border-color: rgba(6,214,160,0.6);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.1),
        0 0 0 12px rgba(6,214,160,0.08),
        0 0 36px rgba(6,214,160,0.2),
        0 14px 38px rgba(0,0,0,0.55);
    }

    #mic-btn.processing {
      border-color: rgba(167,139,250,0.55);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.1),
        0 0 0 12px rgba(167,139,250,0.08),
        0 0 36px rgba(167,139,250,0.22),
        0 14px 38px rgba(0,0,0,0.55);
      animation: processPulse 1.1s ease-in-out infinite;
    }

    #mic-btn.speaking {
      border-color: rgba(247,37,133,0.6);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,0.1),
        0 0 0 12px rgba(247,37,133,0.08),
        0 0 40px rgba(247,37,133,0.25),
        0 14px 38px rgba(0,0,0,0.55);
    }

    .mic-icon { width: 26px; height: 26px; }

    /* ═══════════════════ WAVE BARS ═══════════════════ */
    #wave-bars {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
      height: 36px;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    #wave-bars.active { opacity: 1; }
    #wave-bars span {
      display: block; width: 3px; height: 5px;
      border-radius: 999px;
      background: var(--accent-3);
      box-shadow: 0 0 8px rgba(247,37,133,0.65);
      animation: waveBounce 0.9s ease-in-out infinite;
    }
    #wave-bars span:nth-child(1) { animation-delay:0.00s; --h:10px; }
    #wave-bars span:nth-child(2) { animation-delay:0.11s; --h:22px; }
    #wave-bars span:nth-child(3) { animation-delay:0.22s; --h:30px; }
    #wave-bars span:nth-child(4) { animation-delay:0.05s; --h:18px; }
    #wave-bars span:nth-child(5) { animation-delay:0.17s; --h:26px; }
    #wave-bars span:nth-child(6) { animation-delay:0.28s; --h:20px; }
    #wave-bars span:nth-child(7) { animation-delay:0.08s; --h:14px; }
    #wave-bars span:nth-child(8) { animation-delay:0.19s; --h:24px; }
    #wave-bars span:nth-child(9) { animation-delay:0.13s; --h:12px; }

    /* ═══════════════════ TRANSCRIPT ═══════════════════ */
    .transcript-area {
      width: min(100%, 640px);
      min-height: 56px;
      text-align: center;
      padding: 0.4rem 1rem;
    }

    #transcript {
      font-size: 0.88rem;
      font-style: italic;
      color: var(--muted);
      min-height: 1.3em;
    }

    #reply {
      margin-top: 0.3rem;
      font-size: 0.95rem;
      line-height: 1.65;
      color: var(--text);
      min-height: 1.4em;
    }

    /* ═══════════════════ INFO STRIP ═══════════════════ */
    .info-strip {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 920px;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 1rem;
      padding: 0 1.5rem 2rem;
      margin-top: auto;
    }

    .info-panel {
      background: rgba(8, 14, 30, 0.72);
      backdrop-filter: blur(18px);
      -webkit-backdrop-filter: blur(18px);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 1.1rem 1.3rem;
    }

    .panel-title {
      font-size: 0.66rem;
      font-weight: 700;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 0.85rem;
    }

    .agenda-list,
    .history-list {
      list-style: none;
    }

    .agenda-item,
    .history-item {
      padding: 0.6rem 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
      font-size: 0.82rem;
    }

    .agenda-item:last-child,
    .history-item:last-child { border-bottom: none; }

    .agenda-time   { color: var(--accent-2); font-weight: 700; display: block; font-size: 0.75rem; }
    .agenda-title  { color: var(--text); }
    .agenda-attendees { color: var(--muted); font-size: 0.74rem; }

    .history-you { color: var(--muted); font-size: 0.78rem; margin-bottom: 0.18rem; }
    .history-k   { color: var(--text); font-size: 0.82rem; }

    .history-you::before { content: "You  "; font-weight: 700; color: var(--accent); white-space: pre; }
    .history-k::before   { content: "K  ";   font-weight: 700; color: var(--accent-2); white-space: pre; }

    .list-placeholder { color: var(--muted); font-size: 0.82rem; padding: 0.4rem 0; }

    /* ═══════════════════ SUBTITLE PILL ═══════════════════ */
    #subtitle-bar {
      position: fixed;
      bottom: 15rem;
      left: 50%;
      transform: translateX(-50%) translateY(8px);
      background: rgba(4, 7, 15, 0.88);
      backdrop-filter: blur(24px) saturate(1.7);
      -webkit-backdrop-filter: blur(24px) saturate(1.7);
      border: 1px solid rgba(6, 214, 160, 0.32);
      border-radius: 999px;
      padding: 0.5rem 1.8rem;
      font-size: 1.28rem;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: var(--accent-2);
      text-shadow: 0 0 26px rgba(6, 214, 160, 0.6);
      white-space: nowrap;
      opacity: 0;
      transition: opacity 0.12s ease, transform 0.12s ease;
      pointer-events: none;
      z-index: 150;
      box-shadow: 0 0 30px rgba(6,214,160,0.13), 0 8px 32px rgba(0,0,0,0.55);
    }

    #subtitle-bar.active {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    /* ═══════════════════ TOASTS ═══════════════════ */
    #toast-container {
      position: fixed;
      bottom: 1.4rem;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      gap: 0.6rem;
      z-index: 300;
      pointer-events: none;
    }

    .toast {
      min-width: 220px; max-width: 400px;
      padding: 0.7rem 1rem;
      border-radius: 14px;
      background: rgba(6,8,20,0.95);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: 0 12px 38px rgba(0,0,0,0.48);
      display: flex; align-items: center; gap: 0.7rem;
      pointer-events: auto;
      font-size: 0.86rem;
    }

    .toast.error { border-color: rgba(244,63,94,0.35); }

    .toast-close {
      background: none; border: none;
      color: var(--muted); cursor: pointer;
      margin-left: auto; font-size: 1rem;
    }

    /* ═══════════════════ KEYFRAMES ═══════════════════ */
    @keyframes float {
      0%,100% { transform: translateZ(50px) translateY(0); }
      50%      { transform: translateZ(50px) translateY(-14px); }
    }

    @keyframes speakShake {
      0%,100% { transform: translateZ(50px) rotate(0deg) translateX(0); }
      25%     { transform: translateZ(50px) rotate(-1deg) translateX(-2px); }
      75%     { transform: translateZ(50px) rotate(1deg) translateX(2px); }
    }

    @keyframes processTilt {
      0%,100% { transform: translateZ(50px) rotate(-1.5deg); }
      50%     { transform: translateZ(50px) rotate(1.5deg) translateY(-7px); }
    }

    @keyframes processPulse {
      0%,100% { transform: scale(1); }
      50%     { transform: scale(1.05); }
    }

    @keyframes sparkBlink {
      0%,100% { opacity: 0.38; transform: scale(0.82); }
      50%     { opacity: 1;    transform: scale(1.22); }
    }

    @keyframes ripple {
      0%  { opacity: 0; transform: scale(0.68); }
      18% { opacity: 0.65; }
      100%{ opacity: 0; transform: scale(1.42); }
    }

    @keyframes waveBounce {
      0%,100% { height: 5px; opacity: 0.5; }
      50%     { height: var(--h, 18px); opacity: 1; }
    }

    /* ═══════════════════ RESPONSIVE ═══════════════════ */
    @media (max-width: 700px) {
      .info-strip { grid-template-columns: 1fr; }
      .orbit.r1   { width: 330px; height: 330px; }
      .orbit.r2   { width: 260px; height: 260px; }
      .orbit.r3   { width: 200px; height: 200px; }
      #character-wrap { width: 300px; height: 300px; }
      #cat        { max-width: 300px; }
      #subtitle-bar { font-size: 1.08rem; bottom: 13rem; }
    }
  </style>
</head>
<body>

  <!-- ══════════════ NAVIGATION ══════════════ -->
  <nav class="nav">
    <div class="nav-brand">
      <span class="nav-logo">K</span>
      <span class="nav-tagline">Neural Voice</span>
    </div>
    <div class="nav-actions">
      <span id="user-email"></span>
      <button id="btn-logout" hidden>Sign out</button>
      <a href="/auth/login" id="auth-banner">Connect Google</a>
    </div>
  </nav>

  <div class="app">
    <main class="hero">

  <!-- ══════════════ CANVAS + TILT SCRIPTS ══════════════ -->
  <script>
    (function () {
      const stageCard     = document.getElementById("stage-card");
      const characterWrap = document.getElementById("character-wrap");
      const brainSource   = document.getElementById("brain-source");
      const brainCanvas   = document.getElementById("brain-canvas");
      if (!stageCard || !characterWrap) return;

      const setTilt = (x, y) => {
        characterWrap.style.setProperty("--tilt-x", x + "deg");
        characterWrap.style.setProperty("--tilt-y", y + "deg");
      };

      const renderTransparentBrain = () => {
        if (!brainSource || !brainCanvas || !brainSource.complete) return;
        const w = brainSource.naturalWidth, h = brainSource.naturalHeight;
        if (!w || !h) return;
        brainCanvas.width = w; brainCanvas.height = h;
        const ctx = brainCanvas.getContext("2d", { willReadFrequently: true });
        if (!ctx) return;
        ctx.clearRect(0, 0, w, h);
        ctx.drawImage(brainSource, 0, 0, w, h);
        const id = ctx.getImageData(0, 0, w, h), d = id.data;
        for (let i = 0; i < d.length; i += 4) {
          const r = d[i], g = d[i+1], b = d[i+2];
          const br = (r+g+b)/3, sat = Math.max(r,g,b) - Math.min(r,g,b);
          if (br > 248 && sat < 10)       d[i+3] = 0;
          else if (br > 240 && sat < 18)  d[i+3] = Math.max(0, Math.round(255-(br-240)*8));
        }
        ctx.putImageData(id, 0, 0);
      };

      if (brainSource) {
        if (brainSource.complete) renderTransparentBrain();
        else brainSource.addEventListener("load", renderTransparentBrain, { once: true });
      }

      stageCard.addEventListener("pointermove", e => {
        const r  = stageCard.getBoundingClientRect();
        const px = (e.clientX - r.left) / r.width  - 0.5;
        const py = (e.clientY - r.top)  / r.height - 0.5;
        setTilt(py * -7, px * 9);
      });
      stageCard.addEventListener("pointerleave", () => setTilt(0, 0));
    }());
  </script>
